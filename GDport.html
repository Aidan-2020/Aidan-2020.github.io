<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Development Portfolio - Aidan Brown</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            transition: background-color 0.6s ease;
            font-family: Arial, sans-serif;
        }

        #projects {
            scroll-snap-type: y mandatory;
        }

        .game-section {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

            .video-bg iframe {
                position: absolute;
                width: 177.78vh;
                height: 56.25vw;
                min-width: 100%;
                min-height: 100%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                opacity: 0.35;
                border: none;
            }

        .game-section .content {
            position: relative;
            max-width: 800px;
            text-align: center;
            color: white;
            z-index: 2;
        }

        .game-section h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .game-section p {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
        }

        .game-section a {
            padding: 12px 24px;
            background: black;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav>
        <button class="nav-button" onclick="window.location.href='index.html'">Home</button>
        <button class="nav-button" onclick="window.location.href='programmingPort.html'">Programming Portfolio</button>
        <button class="nav-button">Game Development Portfolio</button>
        <button class="nav-button" onclick="window.location.href='abtMe.html'">More About Me</button>
    </nav>
    <main id="projects">
        <section class="game-section" data-bg="#1f6f43">
            <div class="video-bg">
                <iframe src="https://www.youtube.com/watch?v=yX5qwsXCWRs"
                        allow="autoplay; encrypted-media"
                        allowfullscreen>
                </iframe>
            </div>
            <div class="content">
                <h1>Phantom Feline</h1>
                <p>Stealth puzzle game about a ghost cat vs asshole roombas.</p>
                <a href="https://store.steampowered.com/app/3835880/Phantom_Feline/">Steam</a>
            </div>
        </section>
        <section class="game-section" data-bg="#5b1d1d">
            <div class="video-bg">
                <iframe src="https://www.youtube.com/watch?v=0AbfHWTDL54"
                        allow="autoplay; encrypted-media"
                        allowfullscreen>
                </iframe>
            </div>
            <div class="content">
                <h1>Durian Heist</h1>
                <p>LAN co-op teamwork or scream at your friends.</p>
                <a href="https://magmaw.itch.io/durianheist">Itch</a>
            </div>
        </section>
    </main>
    <script>
        const sections = document.querySelectorAll('.game-section');
        const observer = new IntersectionObserver(
            entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const color = entry.target.dataset.bg;
                        document.body.style.backgroundColor = color;
                    }
                });
            },
            { threshold: 0.6 }
        );
        sections.forEach(section => observer.observe(section));
    </script>
</body>
</html>
