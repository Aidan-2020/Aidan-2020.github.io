    <!-- Load the YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const players = [];

        // Called automatically by YouTube API when it's ready
        window.onYouTubeIframeAPIReady = function () {
            document.querySelectorAll('[id^="player-"]').forEach((el) => {
                const player = new YT.Player(el.id, {
                    videoId: el.dataset.videoid,
                    playerVars: {
                        autoplay: 1,
                        mute: 1,
                        controls: 0,
                        loop: 1,
                        playlist: el.dataset.videoid, // required for loop
                        disablekb: 1,
                        modestbranding: 1,
                        rel: 0,
                        playsinline: 1,
                    },
                    events: {
                        onReady: (e) => e.target.playVideo(), // force play on ready
                        onStateChange: (e) => {
                            // If video ends or pauses unexpectedly, restart it
                            if (e.data === YT.PlayerState.ENDED ||
                                e.data === YT.PlayerState.PAUSED) {
                                e.target.playVideo();
                            }
                        },
                    },
                });
                players.push(player);
            });
        };

        // Background color observer (unchanged)
        const sections = document.querySelectorAll('.game-section');
        const observer = new IntersectionObserver(
            entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.body.style.backgroundColor = entry.target.dataset.bg;
                    }
                });
            },
            { threshold: 0.6 }
        );
        sections.forEach(section => observer.observe(section));
    </script>
